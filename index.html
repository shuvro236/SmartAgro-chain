<!DOCTYPE html>
<html>
<head>
  <title>SmartAgroChain</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background-color: #f4f6f9;
    }
    .card {
      border-radius: 15px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }
  </style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-dark bg-dark px-3">
  <span class="navbar-brand">🌾 SmartAgroChain</span>
  <button class="btn btn-success" onclick="connectWallet()">Connect Wallet</button>
</nav>

<div class="container mt-4">

  <!-- WALLET -->
  <div class="alert alert-info">
    Connected Account: <span id="account">Not Connected</span>
  </div>

  <div class="row">

    <!-- FARMER -->
    <div class="col-md-4">
      <div class="card p-3">
        <h5>👨‍🌾 Farmer Panel</h5>

        <input class="form-control my-2" id="name" placeholder="Product Name">
        <input class="form-control my-2" id="type" placeholder="Type">
        <input class="form-control my-2" id="qty" placeholder="Quantity">
        <input class="form-control my-2" id="cost" placeholder="Cost">

        <button class="btn btn-primary w-100" onclick="addProduct()">Add Product</button>

        <hr>

        <input class="form-control my-2" id="approveId" placeholder="Product ID">
        <button class="btn btn-success w-100" onclick="approve()">Approve Price</button>
      </div>
    </div>

    <!-- COMMUNITY -->
    <div class="col-md-4">
      <div class="card p-3">
        <h5>🏛️ Community Panel</h5>

        <input class="form-control my-2" id="pId" placeholder="Product ID">
        <input class="form-control my-2" id="price" placeholder="Initial Price">

        <button class="btn btn-warning w-100 my-1" onclick="startAuction()">Start Auction</button>
        <button class="btn btn-danger w-100 my-1" onclick="stopAuction()">Stop Auction</button>
      </div>
    </div>

    <!-- RETAILER -->
    <div class="col-md-4">
      <div class="card p-3">
        <h5>🏪 Retailer Panel</h5>

        <input class="form-control my-2" id="bidId" placeholder="Product ID">
        <input class="form-control my-2" id="bidAmount" placeholder="Bid (ETH)">

        <button class="btn btn-primary w-100 my-1" onclick="bid()">Place Bid</button>

        <hr>

        <input class="form-control my-2" id="escrowId" placeholder="Product ID">
        <input class="form-control my-2" id="demand" placeholder="Demand">

        <button class="btn btn-success w-100" onclick="createEscrow()">Create Escrow</button>
      </div>
    </div>

  </div>

</div>

<!-- Web3 -->
<script src="https://cdn.jsdelivr.net/npm/web3@1.10.0/dist/web3.min.js"></script>
<script src="contract.js"></script>
<script src="app.js"></script>

</body>
</html>
